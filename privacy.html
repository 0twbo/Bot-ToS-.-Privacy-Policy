<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6e6e6;

    /* 🌈 same gradient as main */
    background: radial-gradient(circle at top, #1b2a4a 0%, #0f1115 55%, #0b0d12 100%);

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .box {
    width: 100%;
    max-width: 700px;
    background: #1a1d24;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
  }

  h1 {
    color: #4ea1ff;
    margin-top: 0;
  }

  p {
    color: #cfcfcf;
    line-height: 1.6;
  }

  a.button {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 15px;
    background: #2a2f3a;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s;
  }

  a.button:hover {
    background: #3a4150;
    transform: scale(1.05);
  }
</style>
</head>

<body>

<div class="box">

  <h1>Privacy Policy</h1>

  <p>
    This bot does not collect personal data. It only processes messages required for commands.
  </p>

  <a class="button" href="index.html">← Back Home</a>

</div>

</body>
</html>
