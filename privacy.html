<!DOCTYPE html>
<html>
<head>

  <style>
    body {
      background:#0f1115;

      padding:40px;

    .box {
      max-width:700px;
      margin:auto;
      background:#1a1d24;
      padding:30px;
      border-radius:12px;

    h1 { color:#4ea1ff; }

      transition:0.2s;

      background:#3a4150;
      transform:scale(1.05);
    }

</head>
<body>

<div class="box">

</html>
