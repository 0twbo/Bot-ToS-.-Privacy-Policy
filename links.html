<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links - Project Forsaken Bot</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#e6e6e6;
  background: linear-gradient(-45deg,#0b0d12,#1b2a4a,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
  background:rgba(26,29,36,0.92);
  padding:35px;
  border-radius:16px;
  width:100%;
  max-width:600px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{color:#4ea1ff;}

.links{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:25px;
}

a.button{
  text-decoration:none;
  padding:14px;
  border-radius:10px;
  background:#2a2f3a;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

a.button:hover{
  background:#4ea1ff;
  transform:scale(1.04);
}

.back{
  margin-top:20px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="card">

<h1>🔗 Links</h1>

<div class="links">

<a class="button" href="https://github.com/0twbo" target="_blank">
💻 GitHub
</a>

<a class="button" href="#">
🎮 Discord Server
</a>

<a class="button" href="#">
▶️ YouTube
</a>

<a class="button" href="#">
🌐 Website
</a>

</div>

<a class="button back" href="index.html">
← Back Home
</a>

</div>

</body>
</html>
