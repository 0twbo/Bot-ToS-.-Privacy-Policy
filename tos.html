<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Terms of Service</title>

<style>
  body {
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #1b2a4a 0%, #0f1115 60%, #0b0d12 100%);
    color:#e6e6e6;
    padding:40px;
  }

  .box {
    max-width:700px;
    margin:auto;
    background:#1a1d24;
    padding:30px;
    border-radius:14px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
  }

  h1 { color:#4ea1ff; }

  a.button {
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#2a2f3a;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    transition:0.2s;
  }

  a.button:hover {
    background:#3a4150;
    transform:scale(1.05);
  }
</style>
</head>

<body>
<div class="box">
  <h1>Terms of Service</h1>
  <p>
    This bot is provided as-is. Do not abuse, spam, or exploit its features.
    The developer is not responsible for misuse.
  </p>

  <a class="button" href="index.html">← Back Home</a>
</div>
</body>
</html>
