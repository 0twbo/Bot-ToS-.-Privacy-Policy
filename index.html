<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Forsaken Bot</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  color:#e6e6e6;
  overflow-x:hidden;
  min-height:100vh;
  padding:60px 20px;

  background:linear-gradient(-45deg,#0b0d12,#1b2a4a,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;

  display:flex;
  justify-content:center;

  transition:0.5s;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* glow */
.glow{
  position:fixed;
  width:700px;
  height:700px;
  background:#4ea1ff;
  filter:blur(180px);
  opacity:.15;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  animation:pulse 8s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
}

/* nebula */
.nebula{
  position:fixed;
  border-radius:50%;
  filter:blur(140px);
  opacity:.12;
  z-index:0;
  pointer-events:none;
}

.n1{
  width:420px;
  height:420px;
  background:#4ea1ff;
  top:5%;
  left:10%;
}

.n2{
  width:360px;
  height:360px;
  background:#8fd3ff;
  right:10%;
  bottom:10%;
}

.n3{
  width:280px;
  height:280px;
  background:#ffffff;
  top:45%;
  left:45%;
  opacity:.06;
}

/* particles */
.particle{
  position:fixed;
  bottom:-20px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  animation:float linear infinite;
}

@keyframes float{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-120vh);
  }
}

/* layout */
.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:980px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* cards */
.card,.mini{
  background:rgba(26,29,36,.92);
  border-radius:20px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 30px rgba(0,0,0,.35);
  transition:.3s;
}

.card{
  padding:45px;
  text-align:center;
}

.mini{
  flex:1;
  padding:28px;
  text-align:center;
}

.mini:hover{
  transform:translateY(-6px);
}

.row{
  display:flex;
  gap:20px;
}

/* text */
h1{
  color:#4ea1ff;
  margin-bottom:12px;
  font-size:54px;
}

h2{
  color:#4ea1ff;
  margin-bottom:12px;
  font-size:34px;
}

p{
  color:#cfcfcf;
  line-height:1.6;
  font-size:20px;
}

.small-text{
  font-size:16px;
  color:#aaa;
}

/* status */
.status{
  margin-top:24px;
  display:inline-block;
  padding:12px 18px;
  border-radius:12px;
  background:#2a2f3a;
  font-weight:bold;
}

/* buttons */
.buttons{
  margin-top:28px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.button,.theme-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 20px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  transition:.25s;
}

.button{
  background:#4ea1ff;
  color:white;
}

.secondary,.theme-btn{
  background:#2a2f3a;
  color:white;
}

.button:hover,.theme-btn:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 10px 25px rgba(78,161,255,.25);
}

.secondary:hover{
  background:#3a4150;
}

.icon{
  width:22px;
  height:22px;
}

/* light mode */
body.light{
  color:#111;
  background:linear-gradient(-45deg,#f5f8ff,#dce7ff,#eef4ff,#ffffff);
}

body.light .card,
body.light .mini{
  background:rgba(255,255,255,.88);
}

body.light p,
body.light .small-text{
  color:#333;
}

body.light h1,
body.light h2{
  color:#2b67ff;
}

body.light .button{
  background:#2b67ff;
}

body.light .secondary,
body.light .theme-btn,
body.light .status{
  background:#dbe6ff;
  color:#111;
}

/* mobile */
@media(max-width:850px){
  h1{font-size:42px;}
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<div class="container">

<!-- main -->
<div class="card">
<h1>Project Forsaken Bot</h1>
<p>A Discord bot for YouTube notifications, commands.</p>

<div class="status" id="botStatus">🔄 Loading bot status...</div>

<div class="buttons">

<a class="button"
href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands"
target="_blank">
➕ Invite Bot
</a>

<a class="button secondary" href="links.html">
🔗 Links
</a>

<a class="button secondary" href="updates.html">
📋 Update Log
</a>

<button class="theme-btn" onclick="toggleTheme()">
⇄ Theme
</button>

</div>
</div>

<!-- bottom cards -->
<div class="row">

<div class="mini">
<h2>📜 ToS</h2>
<p class="small-text">Rules, fair use, and bot conditions.</p>
<br>
<a class="button secondary" href="tos.html">Open</a>
</div>

<div class="mini">
<h2>🔐 Privacy</h2>
<p class="small-text">No personal data is collected.</p>
<br>
<a class="button secondary" href="privacy.html">Open</a>
</div>

</div>

</div>

<script>
/* particles */
for(let i=0;i<110;i++){
  const p=document.createElement("div");
  const size=Math.random()*6+2;

  p.className="particle";
  p.style.width=size+"px";
  p.style.height=size+"px";
  p.style.left=Math.random()*100+"vw";
  p.style.opacity=Math.random()*0.7+0.1;
  p.style.background=["#4ea1ff","#8fd3ff","#ffffff"][Math.floor(Math.random()*3)];
  p.style.animationDuration=(4+Math.random()*10)+"s";
  p.style.animationDelay=Math.random()*8+"s";

  document.body.appendChild(p);
}

/* theme */
function toggleTheme(){
  document.body.classList.toggle("light");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

/* bot status */
async function loadStatus(){
  try{
    const res=await fetch("http://localhost:3000/status");
    const data=await res.json();

    const el=document.getElementById("botStatus");

    if(data.online){
      el.textContent="🟢 Bot Status: Online";
      el.style.color="#7dffae";
    }else{
      el.textContent="🔴 Bot Status: Offline";
      el.style.color="#ff7b7b";
    }

  }catch{
    document.getElementById("botStatus").textContent="⚠️ Status unavailable";
  }
}

loadStatus();
setInterval(loadStatus,5000);
</script>

</body>
</html>
