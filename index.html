<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#e6e6e6;
  overflow-x:hidden;

  background:linear-gradient(-45deg,#0b0d12,#1b2a4a,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;

  display:flex;
  justify-content:center;
  padding:60px 20px;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 💫 glow */
.glow{
  position:fixed;
  width:700px;
  height:700px;
  background:#4ea1ff;
  filter:blur(180px);
  opacity:.18;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  animation:pulse 7s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
}

/* ✨ particles */
.particle{
  position:fixed;
  bottom:-20px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;

  animation:
    floatDrift linear infinite,
    twinkle ease-in-out infinite;
}

@keyframes floatDrift{
  0%{
    transform:translate(0,0);
  }

  25%{
    transform:translate(18px,-30vh);
  }

  50%{
    transform:translate(-14px,-60vh);
  }

  75%{
    transform:translate(22px,-90vh);
  }

  100%{
    transform:translate(-10px,-125vh);
  }
}

@keyframes twinkle{
  0%,100%{
    opacity:.15;
  }

  50%{
    opacity:.9;
  }
}

/* layout */
.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:920px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* cards */
.card,.mini{
  background:rgba(26,29,36,.92);
  backdrop-filter:blur(6px);
  border-radius:18px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.card{
  padding:42px;
  text-align:center;
}

.row{
  display:flex;
  gap:20px;
}

.mini{
  flex:1;
  padding:28px;
  text-align:center;
  transition:.2s;
}

.mini:hover{
  transform:translateY(-5px);
}

h1{
  margin:0 0 10px;
  color:#4ea1ff;
}

p{
  color:#cfcfcf;
  line-height:1.6;
}

/* buttons */
.buttons{
  margin-top:24px;
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

.button{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  border-radius:10px;
  background:#4ea1ff;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.2s;
}

.button:hover{
  transform:scale(1.06);
  box-shadow:0 10px 25px rgba(78,161,255,.3);
}

.secondary{
  background:#2a2f3a;
}

.secondary:hover{
  background:#3a4150;
}

/* icons */
.icon{
  width:22px;
  height:22px;
}

.small-text{
  font-size:14px;
  color:#aaa;
}

/* mobile */
@media(max-width:800px){
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<!-- ✨ particles (FIXED) -->
<script>
const count = 120;
const colors = ["#4ea1ff","#8fd3ff","#ffffff","#7bc7ff"];

const particles = [];
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

for(let i = 0; i < count; i++){

  const p = document.createElement("div");
  const size = Math.random() * 7 + 2;
  const depth = Math.random() * 0.8 + 0.2;

  p.className = "particle";

  p.style.width = size + "px";
  p.style.height = size + "px";

  const startX = Math.random() * window.innerWidth;

  p.dataset.baseX = startX;
  p.dataset.depth = depth;

  p.style.left = startX + "px";

  p.style.background =
    colors[Math.floor(Math.random()*colors.length)];

  p.style.animationDuration =
    (4 + Math.random()*10) + "s, " +
    (1.5 + Math.random()*3) + "s";

  p.style.animationDelay = (Math.random()*6) + "s";

  if(Math.random() < 0.35){
    p.style.filter = "blur(2px)";
  }

  document.body.appendChild(p);
  particles.push(p);
}

function animateGalaxy(){

  const centerX = window.innerWidth / 2;
  const influence = (mouseX - centerX) / centerX;

  for(const p of particles){

    const baseX = parseFloat(p.dataset.baseX);
    const depth = parseFloat(p.dataset.depth);

    const shift = influence * 30 * depth;

    p.style.left = (baseX + shift) + "px";
  }

  requestAnimationFrame(animateGalaxy);
}

animateGalaxy();
</script>
