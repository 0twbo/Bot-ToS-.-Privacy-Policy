<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot Legal Pages</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      background: #1a1d24;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      color: #4ea1ff;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.6;
      color: #cfcfcf;
    }

    .section {
      margin-bottom: 20px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      background: #2a2f3a;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
      color: #9bbcff;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="section">
      <span class="tag">Terms of Service</span>
      <h1>Terms of Service</h1>
      <p>This bot is provided as-is. Do not abuse its features or attempt to break functionality.</p>
    </div>

    <div class="section">
      <span class="tag">Privacy Policy</span>
      <h1>Privacy Policy</h1>
      <p>This bot does not collect personal data. It only processes messages required for commands and features.</p>
    </div>

  </div>
</body>
</html>
