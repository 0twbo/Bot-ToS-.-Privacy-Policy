<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Forsaken Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1d24;
      padding: 40px;
      border-radius: 16px;
      max-width: 750px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: #4ea1ff;
      margin-bottom: 10px;
    }

    p {
      color: #cfcfcf;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.button {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      background: #4ea1ff;
      color: white;
      font-weight: bold;
      transition: all 0.25s ease;
      transform: scale(1);
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    /* ✨ Hover animation */
    a.button:hover {
      background: #2f89ff;
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(78,161,255,0.25);
    }

    .secondary {
      background: #2a2f3a;
    }

    .secondary:hover {
      background: #3a4150;
    }

    .links {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .links a {
      color: #888;
      text-decoration: none;
      margin: 0 8px;
      transition: 0.2s;
    }

    .links a:hover {
      color: #4ea1ff;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Project Forsaken Bot</h1>
    <p>
      A custom Discord bot that sends YouTube upload notifications,
      responds to commands.
    </p>

    <div class="buttons">

      <a class="button" href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands" target="_blank">
        ➕ Invite Bot
      </a>

      <a class="button secondary" href="https://github.com/0twbo" target="_blank">
        💻 GitHub
      </a>

    </div>

    <div class="links">
      <a href="tos.html">Terms of Service</a> |
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
