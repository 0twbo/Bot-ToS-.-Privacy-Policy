<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Forsaken Bot</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  color:#e6e6e6;
  overflow-x:hidden;
  min-height:100vh;
  padding:60px 20px;

  background:linear-gradient(-45deg,#0b0d12,#1b2a4a,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;

  display:flex;
  justify-content:center;

  transition:0.5s;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* glow */
.glow{
  position:fixed;
  width:700px;
  height:700px;
  background:#4ea1ff;
  filter:blur(180px);
  opacity:.15;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  animation:pulse 8s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
}

/* nebula */
.nebula{
  position:fixed;
  border-radius:50%;
  filter:blur(140px);
  opacity:.12;
  z-index:0;
  pointer-events:none;
}

.n1{
  width:420px;
  height:420px;
  background:#4ea1ff;
  top:5%;
  left:10%;
}

.n2{
  width:360px;
  height:360px;
  background:#8fd3ff;
  right:10%;
  bottom:10%;
}

.n3{
  width:280px;
  height:280px;
  background:#ffffff;
  top:45%;
  left:45%;
  opacity:.06;
}

/* particles */
.particle{
  position:fixed;
  bottom:-20px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  animation:float linear infinite;
}

@keyframes float{
  0%{
    transform:translate(0,0) rotate(0deg);
  }

  25%{
    transform:translate(14px,-30vh) rotate(90deg);
  }

  50%{
    transform:translate(-12px,-60vh) rotate(180deg);
  }

  75%{
    transform:translate(18px,-90vh) rotate(260deg);
  }

  100%{
    transform:translate(-10px,-120vh) rotate(360deg);
  }
}

/* loader */
#loader{
  position:fixed;
  inset:0;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(-45deg,#0b0d12,#152846,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 8s ease infinite;

  transition:opacity .6s ease, visibility .6s ease;
}

#loader.hide{
  opacity:0;
  visibility:hidden;
}

.loader-box{
  text-align:center;
}

.loader-box h2{
  margin-top:18px;
  color:#4ea1ff;
  font-size:28px;
}

.loader-box p{
  margin-top:8px;
  color:#cfcfcf;
}

.loader-ring{
  width:64px;
  height:64px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.08);
  border-top:4px solid #4ea1ff;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
/* layout */
.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:980px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* cards */
.card,.mini{
  background:rgba(26,29,36,.92);
  border-radius:20px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 30px rgba(0,0,0,.35);
  transition:.3s;
}

.card{
  padding:45px;
  text-align:center;
}

.mini{
  position:relative;
  overflow:hidden;

  flex:1;
  padding:28px;
  text-align:center;

  background:rgba(26,29,36,.92);
  border-radius:20px;
  backdrop-filter:blur(10px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.03);

  transition:
    transform .28s ease,
    box-shadow .28s ease,
    border-color .28s ease;

  border:1px solid rgba(255,255,255,.05);
}
.mini::after{
  content:"";
  position:absolute;
  inset:0;
  padding:1px;
  border-radius:20px;

  background:linear-gradient(
    130deg,
    rgba(78,161,255,.55),
    rgba(255,255,255,.05),
    rgba(78,161,255,.25),
    rgba(255,255,255,.04)
  );

  background-size:250% 250%;

  animation:borderFlow 6s linear infinite;

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;
          mask-composite:exclude;

  pointer-events:none;
}
  @keyframes borderFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.mini:hover{
  transform:translateY(-8px) scale(1.02);

  box-shadow:
    0 18px 40px rgba(0,0,0,.35),
    0 0 22px rgba(78,161,255,.18);

  border-color:rgba(78,161,255,.35);
}
  .mini::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
  );

  transform:skewX(-20deg);
  transition:0.8s;
}

.mini:hover::before{
  left:160%;
}
  .mini h2 .icon{
  transition:.25s ease;
}

.mini:hover h2 .icon{
  transform:scale(1.08);
  filter:drop-shadow(0 0 10px rgba(78,161,255,.35));
}
.row{
  display:flex;
  gap:20px;
}

/* text */
h1{
  color:#4ea1ff;
  margin-bottom:12px;
  font-size:54px;
}

h2{
  color:#4ea1ff;
  margin-bottom:12px;
  font-size:34px;
}

p{
  color:#cfcfcf;
  line-height:1.6;
  font-size:20px;
}

.small-text{
  font-size:16px;
  color:#aaa;
}

/* status */
.status{
  margin-top:24px;
  display:inline-block;
  padding:12px 18px;
  border-radius:12px;
  background:#2a2f3a;
  font-weight:bold;
}

/* buttons */
.buttons{
  margin-top:28px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.button,.theme-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 20px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  transition:.25s;
}

.button{
  background:#4ea1ff;
  color:white;
}

.secondary,.theme-btn{
  background:#2a2f3a;
  color:white;
}

.button:hover,.theme-btn:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 10px 25px rgba(78,161,255,.25);
}

.secondary:hover{
  background:#3a4150;
}

.icon{
  width:22px;
  height:22px;
}

/* light mode */
body.light{
  color:#111;
  background:linear-gradient(-45deg,#f5f8ff,#dce7ff,#eef4ff,#ffffff);
}

body.light .card,
body.light .mini{
  background:rgba(255,255,255,.88);
}

body.light p,
body.light .small-text{
  color:#333;
}

body.light h1,
body.light h2{
  color:#2b67ff;
}

body.light .button{
  background:#2b67ff;
}

body.light .secondary,
body.light .theme-btn,
body.light .status{
  background:#dbe6ff;
  color:#111;
}
.icon{
  width:20px;
  height:20px;
  flex-shrink:0;
}

h2 .icon{
  width:32px;
  height:32px;
  margin-bottom:4px;
opacity:.95;
}

.button,
.theme-btn,
h2{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-align:center;
}
/* mobile */
@media(max-width:850px){
  h1{font-size:42px;}
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>
<div id="loader">
  <div class="loader-box">
    <div class="loader-ring"></div>
    <h2>Project Forsaken Bot</h2>
    <p>Loading...</p>
  </div>
</div>
<div class="glow"></div>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<div class="container">

<!-- main -->
<div class="card">
<h1>Project Forsaken Bot</h1>
<p>A Discord bot for YouTube notifications, commands.</p>

<div class="status" id="botStatus">🔄 Loading bot status...</div>

<div class="buttons">

<a class="button"
href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands"
target="_blank">

</svg>
<span>Invite Bot</span>

<a class="button secondary" href="links.html">

  <path d="M15 7h2a5 5 0 1 1 0 10h-2"/>
  <line x1="8" y1="12" x2="16" y2="12"/>
</svg>

<a class="button secondary" href="updates.html">
<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <rect x="8" y="2" width="8" height="4" rx="1"/>
  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
  <path d="M12 11h4"/>
  <path d="M12 16h4"/>

  <path d="M8 16h.01"/>
</svg>
<span>Update Log</span>
</a>

<button class="theme-btn" onclick="toggleTheme()">
<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <path d="M20 7H4"/>
  <path d="m8 21-4-4 4-4"/>
  <path d="M4 17h16"/>
</svg>
<span>Theme</span>
</button>

</div>
</div>

<!-- bottom cards -->
<div class="row">

<div class="mini">
<h2>
<svg class="icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
  <path d="M13.333 2.667v10.667l4 -4 4 4V2.667"/>
  <path d="M5.333 26v-20A3.333 3.333 0 0 1 8.667 2.667H25.333a1.333 1.333 0 0 1 1.333 1.333v24a1.333 1.333 0 0 1 -1.333 1.333H8.667a1.333 1.333 0 0 1 0 -6.667H26.667"/>
</svg>
ToS
</h2>
<p class="small-text">Rules, fair use, and bot conditions.</p>
<br>
<a class="button secondary" href="tos.html">Open</a>
</div>

<div class="mini">
<h2>
<svg class="icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
  <path d="M24 8V5.333a2.667 2.667 0 1 0 -5.333 0v2.667"/>
  <path d="M26.667 20v8a1.333 1.333 0 0 1 -1.333 1.333H8.667a1.333 1.333 0 0 1 0 -6.667H26.667"/>
  <path d="M5.333 26v-20A3.333 3.333 0 0 1 8.667 2.667H13.333"/>
  <path x="12" y="6" width="8" height="5" rx="1" d="M17.333 8H25.333A1.333 1.333 0 0 1 26.667 9.333V13.333A1.333 1.333 0 0 1 25.333 14.667H17.333A1.333 1.333 0 0 1 16 13.333V9.333A1.333 1.333 0 0 1 17.333 8z"/>
</svg>
Privacy
</h2>
<p class="small-text">No personal data is collected.</p>
<br>
<a class="button secondary" href="privacy.html">Open</a>
</div>

</div>

</div>

<script>

/* Start Sound */
  let playedSound = false;

function playStartupSound(){
  if(playedSound) return;

  const audio = document.getElementById("startupSound");
  audio.volume = 0.35;
  audio.play().catch(()=>{});

  playedSound = true;
}

document.addEventListener("click", playStartupSound, { once:true });
document.addEventListener("keydown", playStartupSound, { once:true });
/* Loader */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").classList.add("hide");
  }, 900);
});

/* particles */
for(let i=0;i<110;i++){
  const p=document.createElement("div");
  const size=Math.random()*6+2;

  p.className="particle";
  p.style.width=size+"px";
  p.style.height=size+"px";
  p.style.left=Math.random()*100+"vw";
  p.style.opacity=Math.random()*0.7+0.1;
  p.style.background=["#4ea1ff","#8fd3ff","#ffffff"][Math.floor(Math.random()*3)];
  p.style.animationDuration=(4+Math.random()*10)+"s";
  p.style.animationDelay=Math.random()*8+"s";
if(Math.random() < 0.35){
  p.style.filter = "blur(2px)";
}
  document.body.appendChild(p);
}

/* theme */
function toggleTheme(){
  document.body.classList.toggle("light");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

/* bot status */
async function loadStatus(){
  try{
    const res=await fetch("http://localhost:3000/status");
    const data=await res.json();

    const el=document.getElementById("botStatus");

    if(data.online){
      el.textContent="🟢 Bot Status: Online";
      el.style.color="#7dffae";
    }else{
      el.textContent="🔴 Bot Status: Offline";
      el.style.color="#ff7b7b";
    }

  }catch{
    document.getElementById("botStatus").textContent="⚠️ Status unavailable";
  }
}

loadStatus();
setInterval(loadStatus,5000);
</script>
<audio id="startupSound" preload="auto">
  <source src="startup.mp3" type="audio/mpeg">
</audio>
</body>
</html>
