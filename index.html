<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0twbo Bot</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6e6e6;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #0b0d12, #1b2a4a, #0f1115, #142a3f);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;

    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }

  @keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* 💫 glow */
  .glow {
    position: fixed;
    width: 700px;
    height: 700px;
    background: #4ea1ff;
    filter: blur(180px);
    opacity: 0.18;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse 7s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }

  /* ✨ particles */
  .particle {
    position: absolute;
    background: #4ea1ff;
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    from { transform: translateY(110vh); }
    to { transform: translateY(-10vh); }
  }

  /* 🧱 layout */
  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 25px;
    align-items: center;
    width: 100%;
  }

  .card {
    background: rgba(26, 29, 36, 0.92);
    padding: 40px;
    border-radius: 16px;
    max-width: 750px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
  }

  h1 { color: #4ea1ff; }

  p {
    color: #cfcfcf;
    line-height: 1.6;
  }

  .buttons {
    margin-top: 25px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }

  a.button {
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 10px;
    background: #4ea1ff;
    color: white;
    font-weight: bold;
    transition: all 0.25s ease;
  }

  a.button:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(78,161,255,0.3);
  }

  .secondary {
    background: #2a2f3a;
  }

  .secondary:hover {
    background: #3a4150;
  }

  /* 🟦 2-CARD ROW */
  .row {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .small-card {
    flex: 1;
    padding: 25px;
    background: rgba(26, 29, 36, 0.92);
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    transition: transform 0.2s ease;
  }

  .small-card:hover {
    transform: translateY(-5px);
  }

  .small-text {
    font-size: 13px;
    color: #aaa;
    line-height: 1.5;
  }

  /* 📱 mobile fix */
  @media (max-width: 800px) {
    .row {
      flex-direction: column;
    }
  }
</style>
</head>

<body>

<div class="glow"></div>

<script>
  const count = 90;

  for (let i = 0; i < count; i++) {
    let p = document.createElement("div");

    let size = Math.random() * 7 + 2;

    p.className = "particle";
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 10) + "s";
    p.style.opacity = Math.random() * 0.6 + 0.1;

    document.body.appendChild(p);
  }
</script>

<div class="container">

  <!-- 🟦 MAIN -->
  <div class="card">
    <h1>Project Forsaken Bot</h1>
    <p>
      A Discord bot for YouTube notifications, commands.
    </p>

    <div class="buttons">
      <a class="button"
        href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands"
        target="_blank">
        ➕ Invite Bot
      </a>

      <a class="button secondary" href="links.html">
  🔗 Links
       </a>
    </div>
  </div>

  <!-- 🟦 ROW (TOS + PRIVACY) -->
  <div class="row">

    <div class="small-card">
      <h1>📜 ToS</h1>
      <p class="small-text">
        Do not abuse or exploit the bot. It is provided as-is without guarantees.
      </p>
      <a class="button secondary" href="tos.html">Open</a>
    </div>

    <div class="small-card">
      <h1>🔐 Privacy</h1>
      <p class="small-text">
        No personal data is collected. Only required message data is processed.
      </p>
      <a class="button secondary" href="privacy.html">Open</a>
    </div>

  </div>

</div>

</body>
</html>
