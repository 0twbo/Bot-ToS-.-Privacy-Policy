<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0twbo Bot</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6e6e6;
    overflow: hidden;

    /* 🌈 animated gradient */
    background: linear-gradient(-45deg, #0b0d12, #1b2a4a, #0f1115, #142a3f);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
  }

  @keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* 💫 glow */
  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    background: #4ea1ff;
    filter: blur(180px);
    opacity: 0.2;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse 7s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.28; }
  }

  /* ✨ particles */
  .particle {
    position: absolute;
    background: #4ea1ff;
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    from { transform: translateY(110vh); }
    to { transform: translateY(-10vh); }
  }

  /* 🧱 main card */
  .card {
    position: relative;
    z-index: 2;
    background: rgba(26, 29, 36, 0.92);
    padding: 40px;
    border-radius: 16px;
    max-width: 750px;
    margin: auto;
    top: 50%;
    transform: translateY(25%);
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
  }

  h1 { color: #4ea1ff; }

  p {
    color: #cfcfcf;
    line-height: 1.6;
  }

  .buttons {
    margin-top: 25px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }

  a.button {
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 10px;
    background: #4ea1ff;
    color: white;
    font-weight: bold;
    transition: all 0.25s ease;
  }

  a.button:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(78,161,255,0.3);
  }

  .secondary {
    background: #2a2f3a;
  }

  .secondary:hover {
    background: #3a4150;
  }

  .links {
    margin-top: 18px;
    font-size: 13px;
  }

  .links a {
    color: #888;
    text-decoration: none;
    margin: 0 8px;
  }

  .links a:hover {
    color: #4ea1ff;
  }
</style>
</head>

<body>

<!-- 💫 glow layer -->
<div class="glow"></div>

<!-- ✨ particles -->
<script>
  const count = 100;

  for (let i = 0; i < count; i++) {
    let p = document.createElement("div");

    let size = Math.random() * 8 + 2;

    p.className = "particle";

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * 100 + "vw";

    /* 🚀 random speed */
    p.style.animationDuration = (3 + Math.random() * 10) + "s";

    /* 💡 YOUR IDEA: random transparency */
    p.style.opacity = Math.random() * 0.6 + 0.1;

    document.body.appendChild(p);
  }
</script>

<!-- 🧱 content -->
<div class="card">
  <h1>Project Forsaken Bot</h1>
  <p>
    A Discord bot for YouTube notifications, commands.
  </p>

  <div class="buttons">

    <a class="button"
      href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands"
      target="_blank">
      ➕ Invite Bot
    </a>

    <a class="button secondary" href="https://github.com/0twbo" target="_blank">
      💻 GitHub
    </a>

  </div>

  <div class="links">
    <a href="tos.html">Terms of Service</a> |
    <a href="privacy.html">Privacy Policy</a>
  </div>
</div>

</body>
</html>
