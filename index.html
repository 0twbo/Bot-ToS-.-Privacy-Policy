<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>0twbo Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      overflow: hidden;
    }

    /* ✨ floating particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #4ea1ff;
      border-radius: 50%;
      opacity: 0.4;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .card {
      position: relative;
      z-index: 2;
      background: #1a1d24;
      padding: 40px;
      border-radius: 16px;
      max-width: 750px;
      margin: auto;
      top: 50%;
      transform: translateY(30%);
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: #4ea1ff;
    }

    p {
      color: #cfcfcf;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.button {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      background: #4ea1ff;
      color: white;
      font-weight: bold;
      transition: all 0.25s ease;
    }

    a.button:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(78,161,255,0.3);
    }

    .secondary {
      background: #2a2f3a;
    }

    .secondary:hover {
      background: #3a4150;
    }

    .links {
      margin-top: 18px;
      font-size: 13px;
    }

    .links a {
      color: #888;
      text-decoration: none;
      margin: 0 8px;
    }

    .links a:hover {
      color: #4ea1ff;
    }
  </style>
</head>

<body>

<!-- particles -->
<script>
  for (let i = 0; i < 25; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(p);
  }
</script>

<div class="card">
  <h1>🤖 0twbo Bot</h1>
  <p>
    A Discord bot that handles YouTube notifications, commands,
    and server automation features.
  </p>

  <div class="buttons">

    <a class="button"
      href="https://discord.com/oauth2/authorize?client_id=1494266712755798127&permissions=8&scope=bot%20applications.commands"
      target="_blank">
      ➕ Invite Bot
    </a>

    <a class="button secondary" href="https://github.com/0twbo" target="_blank">
      💻 GitHub
    </a>

  </div>

  <div class="links">
    <a href="tos.html">Terms of Service</a> |
    <a href="privacy.html">Privacy Policy</a>
  </div>
</div>

</body>
</html>
