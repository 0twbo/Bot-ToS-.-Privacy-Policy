<style>
  .nebula{
  position:fixed;
  border-radius:50%;
  filter:blur(140px);
  opacity:.16;
  z-index:0;
  pointer-events:none;
  animation:nebulaMove 18s ease-in-out infinite;
}

.nebula1{
  width:420px;
  height:420px;
  background:#4ea1ff;
  top:8%;
  left:10%;
}

.nebula2{
  width:360px;
  height:360px;
  background:#7bc7ff;
  bottom:12%;
  right:8%;
  animation-delay:4s;
}

.nebula3{
  width:300px;
  height:300px;
  background:#ffffff;
  top:45%;
  left:50%;
  opacity:.08;
  animation-delay:8s;
}

@keyframes nebulaMove{
  0%,100%{
    transform:translate(0,0) scale(1);
  }

  50%{
    transform:translate(30px,-20px) scale(1.12);
  }
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#e6e6e6;
  overflow-x:hidden;

  background:linear-gradient(-45deg,#0b0d12,#1b2a4a,#0f1115,#142a3f);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;

  display:flex;
  justify-content:center;
  padding:60px 20px;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
  
body{
  transition: background 0.6s ease, color 0.6s ease;
}

.card, .mini, .button, .theme-btn, p, h1{
  transition: background 0.6s ease, color 0.6s ease;
}
/* 💫 glow */
.glow{
  position:fixed;
  width:700px;
  height:700px;
  background:#4ea1ff;
  filter:blur(180px);
  opacity:.18;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  animation:pulse 7s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
}

/* ✨ particles */
.particle{
  position:fixed;
  bottom:-20px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;

  animation:
    floatDrift linear infinite,
    twinkle ease-in-out infinite;
}

@keyframes floatDrift{
  0%{
    transform:translate(0,0);
  }

  25%{
    transform:translate(18px,-30vh);
  }

  50%{
    transform:translate(-14px,-60vh);
  }

  75%{
    transform:translate(22px,-90vh);
  }

  100%{
    transform:translate(-10px,-125vh);
  }
}

@keyframes twinkle{
  0%,100%{
    opacity:.15;
  }

  50%{
    opacity:.9;
  }
}

/* layout */

p{

<!-- ✨ particles (FIXED) -->
<script>
const count = 120;
const colors = ["#4ea1ff","#8fd3ff","#ffffff","#7bc7ff"];

const particles = [];
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

for(let i = 0; i < count; i++){

  const p = document.createElement("div");
  const size = Math.random() * 7 + 2;
  const depth = Math.random() * 0.8 + 0.2;

  p.className = "particle";

  p.style.width = size + "px";
  p.style.height = size + "px";

  const startX = Math.random() * window.innerWidth;

  p.dataset.baseX = startX;
  p.dataset.depth = depth;

  p.style.left = startX + "px";

  p.style.background =
    colors[Math.floor(Math.random()*colors.length)];

  p.style.animationDuration =
    (4 + Math.random()*10) + "s, " +
    (1.5 + Math.random()*3) + "s";

  p.style.animationDelay = (Math.random()*6) + "s";

  if(Math.random() < 0.35){
    p.style.filter = "blur(2px)";
  }

  document.body.appendChild(p);
  particles.push(p);
}

function animateGalaxy(){

  const centerX = window.innerWidth / 2;
  const influence = (mouseX - centerX) / centerX;

  for(const p of particles){

    const baseX = parseFloat(p.dataset.baseX);
    const depth = parseFloat(p.dataset.depth);

    const shift = influence * 30 * depth;

    p.style.left = (baseX + shift) + "px";
  }

  requestAnimationFrame(animateGalaxy);
}

animateGalaxy();
</script>

<script>
function applyTheme(isLight){
  document.body.classList.toggle("light", isLight);
  localStorage.setItem("theme", isLight ? "light" : "dark");
}

function toggleTheme(){
  const isLight = document.body.classList.contains("light");
  applyTheme(!isLight);
}

const saved = localStorage.getItem("theme");
if(saved === "light"){
  document.body.classList.add("light");
}

async function loadStatus(){
  try{
    const res = await fetch("http://localhost:3000/status");
    const data = await res.json();

    const el = document.getElementById("botStatus");

    if(data.online){
      el.textContent = "🟢 Bot Status: Online";
      el.style.color = "#7dffae";
    }else{
      el.textContent = "🔴 Bot Status: Offline";
      el.style.color = "#ff6b6b";
    }

  }catch(e){
    document.getElementById("botStatus").textContent =
      "⚠️ Status unavailable";
  }
}

loadStatus();
setInterval(loadStatus, 5000);
</script>
